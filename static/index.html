<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI Code Review</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1a1d21;
    --muted: #6b7280;
    --border: #e3e6ea;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --code-bg: #f2f3f5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f1115;
      --card: #171a20;
      --text: #e6e8eb;
      --muted: #9aa1ac;
      --border: #262b33;
      --accent: #7c74ff;
      --accent-hover: #948dff;
      --code-bg: #10131a;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 24px 16px 64px; }
  header { margin-bottom: 20px; }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  .sub { color: var(--muted); font-size: 0.95rem; margin: 0; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 16px;
  }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; font-weight: 600; }
  textarea {
    width: 100%;
    min-height: 220px;
    resize: vertical;
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.9rem;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--code-bg);
    color: var(--text);
  }
  .row { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 140px; }
  input, select {
    width: 100%;
    padding: 10px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text);
    font-size: 0.9rem;
  }
  button {
    margin-top: 14px;
    width: 100%;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover:not(:disabled) { background: var(--accent-hover); }
  button:disabled { opacity: 0.6; cursor: default; }
  #out { display: none; }
  #out.show { display: block; }
  .out-body { overflow-x: auto; }
  .out-body pre {
    background: var(--code-bg);
    padding: 12px;
    border-radius: 8px;
    overflow-x: auto;
  }
  .out-body code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 0.88rem; }
  .out-body :not(pre) > code { background: var(--code-bg); padding: 2px 5px; border-radius: 5px; }
  .out-body h1, .out-body h2, .out-body h3 { margin-top: 1.2em; }
  .meta { color: var(--muted); font-size: 0.8rem; margin-top: 14px; border-top: 1px solid var(--border); padding-top: 10px; }
  .spinner {
    display: inline-block; width: 16px; height: 16px; vertical-align: -3px;
    border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { color: #dc2626; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🤖 AI Code Review</h1>
    <p class="sub">Paste your code, get an instant review — bugs, security, and improvements.</p>
  </header>

  <div class="card">
    <label for="code">Your code</label>
    <textarea id="code" placeholder="Paste code here..." spellcheck="false"></textarea>
    <div class="row">
      <div>
        <label for="language">Language (optional)</label>
        <input id="language" placeholder="e.g. python" />
      </div>
      <div>
        <label for="filename">Filename (optional)</label>
        <input id="filename" placeholder="e.g. app.py" />
      </div>
    </div>
    <button id="go">Review my code</button>
  </div>

  <div class="card" id="out">
    <div class="out-body" id="body"></div>
    <div class="meta" id="meta"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const btn = document.getElementById('go');
  const out = document.getElementById('out');
  const body = document.getElementById('body');
  const meta = document.getElementById('meta');

  function render(text) {
    // marked may fail to load if the CDN is blocked; fall back to plain text.
    if (window.marked) {
      body.innerHTML = marked.parse(text);
    } else {
      body.innerHTML = '<pre></pre>';
      body.querySelector('pre').textContent = text;
    }
  }

  async function review() {
    const code = document.getElementById('code').value.trim();
    if (!code) { alert('Paste some code first.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Reviewing...';
    out.classList.add('show');
    body.innerHTML = '<p class="sub">Thinking… this takes a few seconds.</p>';
    meta.textContent = '';

    try {
      const resp = await fetch('/review/code', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          code,
          language: document.getElementById('language').value.trim() || null,
          filename: document.getElementById('filename').value.trim() || null,
        }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        body.innerHTML = '<p class="error">Error: ' + (data.detail || resp.status) + '</p>';
      } else {
        render(data.review);
        meta.textContent = 'Reviewed by ' + data.model;
      }
    } catch (e) {
      body.innerHTML = '<p class="error">Network error: ' + e.message + '</p>';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Review my code';
    }
  }

  btn.addEventListener('click', review);
</script>
</body>
</html>
